name: Linux Artifact

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  ARTIFACT_NAME: google-search-console-mcp-linux-x86_64
  ARTIFACT_ZIP: google-search-console-mcp-linux-x86_64.zip
  CARGO_AUDITABLE_VERSION: 0.7.5
  SBOM_NAME: google-search-console-mcp-linux-x86_64.spdx.json

jobs:
  build:
    name: Build Linux x86_64 artifact
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    outputs:
      artifact-digest: ${{ steps.upload.outputs.artifact-digest }}
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
      artifact-url: ${{ steps.upload.outputs.artifact-url }}

    steps:
      - name: Checkout
        # actions/checkout v6
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install pinned auditable build tool
        # taiki-e/install-action v2.83.0
        uses: taiki-e/install-action@c7eb1735f09259a5035e8e5d44b1406b1cddc0fb
        with:
          tool: cargo-auditable@0.7.5

      - name: Build auditable release binary
        run: cargo auditable build --release --locked --bin google-search-console-mcp

      - name: Stage artifact
        run: |
          set -euo pipefail
          mkdir -p dist
          cp target/release/google-search-console-mcp dist/google-search-console-mcp
          chmod 0755 dist/google-search-console-mcp

      - name: Install pinned SBOM generator
        id: syft
        # anchore/sbom-action v0.24.0
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610
        with:
          syft-version: v1.46.0

      - name: Generate SPDX SBOM
        env:
          SYFT_CMD: ${{ steps.syft.outputs.cmd }}
        run: |
          set -euo pipefail
          "${SYFT_CMD}" scan "file:dist/google-search-console-mcp" \
            --source-name "${GITHUB_REPOSITORY}" \
            --source-version "${GITHUB_SHA}" \
            --output "spdx-json=dist/${SBOM_NAME}"

          rust_packages="$(jq \
            '[.packages[]?
              | select(any(.externalRefs[]?;
                  .referenceType == "purl"
                  and (.referenceLocator | startswith("pkg:cargo/"))))]
              | length' \
            "dist/${SBOM_NAME}")"
          dependency_relationships="$(jq \
            '[.relationships[]? | select(.relationshipType == "DEPENDENCY_OF")] | length' \
            "dist/${SBOM_NAME}")"

          jq -e \
            --arg repository "${GITHUB_REPOSITORY}" \
            --arg source_sha "${GITHUB_SHA}" \
            '.spdxVersion == "SPDX-2.3"
              and .SPDXID == "SPDXRef-DOCUMENT"
              and .name == $repository
              and any(.packages[]?; .name == $repository and .versionInfo == $source_sha)' \
            "dist/${SBOM_NAME}" > /dev/null

          if (( rust_packages < 2 || dependency_relationships < 1 )); then
            echo "SBOM dependency graph is empty or incomplete: rust_packages=${rust_packages}, dependency_relationships=${dependency_relationships}" >&2
            exit 1
          fi

          {
            echo "RUST_PACKAGE_COUNT=${rust_packages}"
            echo "DEPENDENCY_RELATIONSHIP_COUNT=${dependency_relationships}"
          } >> "${GITHUB_ENV}"

      - name: Write artifact manifest
        run: |
          set -euo pipefail
          {
            echo "# artifact=${ARTIFACT_NAME}"
            echo "# binary=google-search-console-mcp"
            echo "# version=$(dist/google-search-console-mcp --version)"
            echo "# repository=${GITHUB_REPOSITORY}"
            echo "# source_ref=${GITHUB_REF}"
            echo "# source_sha=${GITHUB_SHA}"
            echo "# target=x86_64-unknown-linux-gnu"
            echo "# sbom=${SBOM_NAME}"
            echo "# auditable_builder=cargo-auditable-v${CARGO_AUDITABLE_VERSION}"
            echo "# sbom_generator=syft-v1.46.0"
            echo "# sbom_rust_packages=${RUST_PACKAGE_COUNT}"
            echo "# sbom_dependency_relationships=${DEPENDENCY_RELATIONSHIP_COUNT}"
            (
              cd dist
              sha256sum google-search-console-mcp "${SBOM_NAME}"
            )
          } > dist/MANIFEST.txt

      - name: Upload artifact
        id: upload
        # actions/upload-artifact v4.6.2
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist/
          if-no-files-found: error

      - name: Record immutable artifact identity
        env:
          ARTIFACT_DIGEST: ${{ steps.upload.outputs.artifact-digest }}
          ARTIFACT_ID: ${{ steps.upload.outputs.artifact-id }}
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
        run: |
          {
            echo "### Linux CI artifact"
            echo
            echo "- Artifact ID: \`${ARTIFACT_ID}\`"
            echo "- Artifact ZIP digest: \`${ARTIFACT_DIGEST}\`"
            echo "- Artifact URL: ${ARTIFACT_URL}"
          } >> "${GITHUB_STEP_SUMMARY}"

  attest:
    name: Attest protected-main CI artifact
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      attestations: write
      contents: read
      id-token: write

    steps:
      - name: Download exact same-run artifact ZIP
        # actions/download-artifact v8.0.1
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          artifact-ids: ${{ needs.build.outputs.artifact-id }}
          path: downloaded
          skip-decompress: true
          digest-mismatch: error

      - name: Verify ZIP digest and extract SBOM
        env:
          EXPECTED_DIGEST: ${{ needs.build.outputs.artifact-digest }}
        run: |
          set -euo pipefail
          archive="downloaded/${ARTIFACT_ZIP}"
          expected_sha256="${EXPECTED_DIGEST#sha256:}"

          test -f "${archive}"
          printf '%s  %s\n' "${expected_sha256}" "${archive}" | sha256sum --check --strict
          unzip -p "${archive}" "${SBOM_NAME}" > "${RUNNER_TEMP}/${SBOM_NAME}"
          jq -e '.spdxVersion == "SPDX-2.3" and .SPDXID == "SPDXRef-DOCUMENT"' \
            "${RUNNER_TEMP}/${SBOM_NAME}" > /dev/null

      - name: Attest ZIP build provenance
        # actions/attest v4.1.1
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763
        with:
          subject-name: ${{ env.ARTIFACT_ZIP }}
          subject-digest: ${{ needs.build.outputs.artifact-digest }}

      - name: Attest ZIP SBOM
        # actions/attest v4.1.1
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763
        with:
          subject-name: ${{ env.ARTIFACT_ZIP }}
          subject-digest: ${{ needs.build.outputs.artifact-digest }}
          sbom-path: ${{ runner.temp }}/${{ env.SBOM_NAME }}
