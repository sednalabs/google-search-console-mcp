name: codeql-query-tests

on:
  pull_request:
    paths:
      - ".github/codeql/actions-workflow-security/**"
      - ".github/workflows/codeql.yml"
      - ".github/workflows/codeql-query-tests.yml"
  push:
    branches:
      - main
    paths:
      - ".github/codeql/actions-workflow-security/**"
      - ".github/workflows/codeql.yml"
      - ".github/workflows/codeql-query-tests.yml"
  workflow_dispatch:

permissions:
  contents: read
  security-events: read

concurrency:
  group: codeql-query-tests::${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile-actions-queries:
    name: Compile Actions CodeQL queries
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        # actions/checkout v6
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up CodeQL
        # github/codeql-action v4
        id: setup-codeql
        uses: github/codeql-action/setup-codeql@99df26d4f13ea111d4ec1a7dddef6063f76b97e9

      - name: Install query pack dependencies
        shell: bash
        run: |
          set -euo pipefail
          "${{ steps.setup-codeql.outputs.codeql-path }}" pack install .github/codeql/actions-workflow-security

      - name: Resolve query suite
        shell: bash
        run: |
          set -euo pipefail
          "${{ steps.setup-codeql.outputs.codeql-path }}" resolve queries \
            --search-path .github/codeql \
            .github/codeql/actions-workflow-security/suites/actions-workflow-security.qls

      - name: Compile queries
        shell: bash
        run: |
          set -euo pipefail
          "${{ steps.setup-codeql.outputs.codeql-path }}" query compile \
            --search-path .github/codeql \
            .github/codeql/actions-workflow-security/*.ql

      - name: Run Actions query tests
        shell: bash
        run: |
          set -euo pipefail
          "${{ steps.setup-codeql.outputs.codeql-path }}" test run \
            --search-path .github/codeql \
            .github/codeql/actions-workflow-security/test
