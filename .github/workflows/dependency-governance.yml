name: dependency-governance

on:
  pull_request:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "deny.toml"
      - ".github/workflows/dependency-governance.yml"
  push:
    branches:
      - main
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "deny.toml"
      - ".github/workflows/dependency-governance.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dependency-governance::${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-governance:
    name: Rust dependency governance
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        # actions/checkout v6
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install Rust toolchain
        # dtolnay/rust-toolchain stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Cache cargo artifacts
        # swatinem/rust-cache v2
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - name: Install governance tools
        # taiki-e/install-action v2
        uses: taiki-e/install-action@15413b256f995d819248ea62704771a959284285
        with:
          tool: cargo-deny,cargo-audit,cargo-outdated

      - name: Check advisories and sources
        shell: bash
        run: |
          set -euo pipefail
          cargo deny check advisories sources
          cargo audit --deny warnings

      - name: Report outdated dependencies
        continue-on-error: true
        shell: bash
        run: cargo outdated --workspace --exit-code 1
